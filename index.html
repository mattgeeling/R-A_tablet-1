<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>R&amp;A Interactive</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="stage" aria-live="polite">
            <div id="attractor-screen" class="screen screen-attractor" aria-label="R&A attractor">
              <button id="attractor-start" class="attractor-start" type="button" aria-label="Start interactive">
                <video class="attractor-video" autoplay muted loop playsinline aria-hidden="true">
                  <source src="./assets/videos/Attractor 1_slower.mp4" type="video/mp4" />
                </video>
              </button>
            </div>

            <div id="menu-screen" class="screen screen-menu is-hidden" aria-label="R&A menu">
              <div class="panel-track">
                <button class="menu-panel panel-portraits" type="button" data-open-view="portraits" aria-label="Portraits">
                  <img src="./assets/images/portraits.png" alt="Portraits" />
                </button>
                <button class="menu-panel panel-landscapes" type="button" aria-label="Landscapes">
                  <img src="./assets/images/landscapes.png" alt="Landscapes" />
                </button>
                <button class="menu-panel panel-sculpture" type="button" data-open-view="sculpture" aria-label="Sculpture">
                  <img src="./assets/images/sculpture.png" alt="Sculpture" />
                </button>
              </div>
            </div>

            <div id="portrait-screen" class="screen screen-portrait is-hidden" aria-label="Portrait details">
              <button id="portrait-back" class="portrait-back" type="button" aria-label="Back to menu">
                <img src="./assets/images/back.svg" alt="" />
              </button>

              <section class="portrait-copy">
                <div class="portrait-text-flow">
                  <h1 id="portrait-title" class="portrait-title"></h1>
                  <p id="portrait-artist" class="portrait-artist"></p>
                  <p id="portrait-summary" class="portrait-summary"></p>
                  <p id="portrait-body" class="portrait-body"></p>
                </div>
                <div class="portrait-scroll-cue" aria-hidden="true">
                  <span class="portrait-scroll-cue-arrow"></span>
                </div>

                <div class="portrait-controls">
                  <button class="portrait-control portrait-control-back" type="button">
                    Back
                  </button>
                  <button class="portrait-control portrait-control-text" type="button" aria-label="Text size">
                    Aa
                  </button>
                </div>
              </section>

              <section class="portrait-artwork-wrap">
                <div id="portrait-artwork" class="portrait-artwork" aria-hidden="true"></div>
                <div id="portrait-image-dots" class="portrait-image-dots is-hidden" aria-label="Portrait image options"></div>
              </section>

              <button id="portrait-prev" class="portrait-prev" type="button" aria-label="Previous portrait">
                <span class="portrait-prev-arrow"></span>
              </button>

              <button id="portrait-next" class="portrait-next" type="button" aria-label="Next portrait">
                <span class="portrait-next-arrow"></span>
              </button>

              <p id="portrait-count" class="portrait-count"></p>
            </div>

            <div id="landscape-screen" class="screen screen-landscape is-hidden" aria-label="Landscape details">
              <section class="landscape-artwork-wrap">
                <div id="landscape-artwork" class="landscape-artwork" aria-hidden="true"></div>
                <div class="landscape-dots" aria-label="Landscape steps">
                  <button class="landscape-dot is-active" type="button" data-landscape-step="0" aria-label="Landscape step 1">
                    <img src="./assets/images/Ellipse.svg" alt="" />
                  </button>
                  <button class="landscape-dot" type="button" data-landscape-step="1" aria-label="Landscape step 2">
                    <img src="./assets/images/Ellipse.svg" alt="" />
                  </button>
                  <button class="landscape-dot" type="button" data-landscape-step="2" aria-label="Landscape step 3">
                    <img src="./assets/images/Ellipse.svg" alt="" />
                  </button>
                  <button class="landscape-dot" type="button" data-landscape-step="3" aria-label="Landscape step 4">
                    <img src="./assets/images/Ellipse.svg" alt="" />
                  </button>
                </div>
              </section>

              <section class="landscape-copy">
                <h1 id="landscape-title" class="landscape-title landscape-title-fixed"></h1>
                <p id="landscape-artist" class="landscape-artist"></p>
                <p id="landscape-date" class="landscape-date"></p>
                <p id="landscape-body" class="landscape-body"></p>
              </section>

              <button id="landscape-prev-painting" class="landscape-painting-nav landscape-painting-prev" type="button" aria-label="Previous landscape">
                <span class="landscape-painting-prev-arrow"></span>
              </button>

              <button id="landscape-next-painting" class="landscape-painting-nav landscape-painting-next" type="button" aria-label="Next landscape">
                <span class="landscape-painting-next-arrow"></span>
              </button>

              <div class="landscape-controls">
                <button class="landscape-control landscape-control-text" type="button" aria-label="Text size">Aa</button>
                <button id="landscape-back" class="landscape-control landscape-control-back" type="button">Back</button>
              </div>
            </div>

            <div id="sculpture-screen" class="screen screen-sculpture is-hidden" aria-label="Sculpture details">
              <section class="sculpture-copy">
                <div class="sculpture-text-flow">
                  <h1 id="sculpture-title" class="sculpture-title"></h1>
                  <p id="sculpture-artist" class="sculpture-artist"></p>
                  <p id="sculpture-body" class="sculpture-body"></p>
                </div>

                <div class="sculpture-controls">
                  <button id="sculpture-back" class="sculpture-control sculpture-control-back" type="button">Back</button>
                  <button class="sculpture-control sculpture-control-text" type="button" aria-label="Text size">Aa</button>
                </div>
              </section>

              <section class="sculpture-artwork-wrap">
                <div id="sculpture-artwork" class="sculpture-artwork" aria-hidden="true"></div>
              </section>

              <button id="sculpture-prev" class="sculpture-prev" type="button" aria-label="Previous sculpture">
                <span class="sculpture-prev-arrow"></span>
              </button>

              <button id="sculpture-next" class="sculpture-next" type="button" aria-label="Next sculpture">
                <span class="sculpture-next-arrow"></span>
              </button>
            </div>
      </section>
    </main>

    <script src="./src/app.js" defer></script>
  </body>
</html>
