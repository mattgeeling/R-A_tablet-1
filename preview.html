<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>R&amp;A Interactive Preview</title>
    <style>
      @font-face {
        font-family: "Radikal";
        src:
          url("./assets/fonts/Radikal-Regular.woff2") format("woff2"),
          url("./assets/fonts/Radikal-Regular.woff") format("woff");
        font-style: normal;
        font-weight: 400;
        font-display: swap;
      }

      @font-face {
        font-family: "Radikal";
        src:
          url("./assets/fonts/Radikal-Bold.woff2") format("woff2"),
          url("./assets/fonts/Radikal-Bold.woff") format("woff");
        font-style: normal;
        font-weight: 600;
        font-display: swap;
      }

      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 48px 24px;
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.96), rgba(235, 238, 245, 0.92) 55%, rgba(222, 226, 236, 0.9)),
          #eef1f7;
        font-family: "Radikal", Avenir, "Avenir Next", "Helvetica Neue", Helvetica, Arial, sans-serif;
      }

      .preview-shell {
        display: grid;
        justify-items: center;
        gap: 28px;
      }

      .preview-debug {
        margin: 0;
        color: #7a8097;
        font-size: 14px;
        font-weight: 400;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .preview-label {
        margin: 0;
        color: #5b637f;
        font-size: 19px;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .tablet-frame {
        padding: 30px;
        border-radius: 42px;
        background: #000;
        box-shadow:
          0 28px 56px rgba(19, 26, 52, 0.16),
          0 8px 18px rgba(19, 26, 52, 0.1);
      }

      .tablet-stage {
        display: block;
        width: 1080px;
        height: 810px;
        border: 0;
        border-radius: 24px;
        background: #191e42;
      }
    </style>
  </head>
  <body>
    <main class="preview-shell">
      <p class="preview-label">Client Preview • Fixed 1080 × 810</p>
      <p class="preview-debug">Client Amends 23-3-26</p>
      <div class="tablet-frame">
        <iframe class="tablet-stage" src="./index.html" title="R&amp;A tablet preview"></iframe>
      </div>
    </main>
  </body>
</html>
